name: Supabase keepalive

on:
  schedule:
    # 매일 UTC 18:00 = KST 03:00
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          curl -fsS --max-time 30 https://deeplesson.vercel.app/api/keepalive
